{% extends 'base.html' %}
{% load static %}

{% block title %}
سبد خرید خالی - {{ site_settings.site_name }}
{% endblock %}

{% block content %}

<main class="flex-1">

<div class="container mx-auto px-4">

<div class="flex flex-col items-center justify-center text-center py-24">

<img
src="{% static 'images/empty-cart.png' %}"
alt="سبد خرید خالی"
class="w-52 md:w-64 opacity-80 mb-8">


<h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4">

سبد خرید شما خالی است

</h1>


<p class="text-gray-600 max-w-md leading-relaxed mb-10">

هنوز محصولی به سبد خرید اضافه نکرده‌اید.
برای مشاهده محصولات و شروع خرید به فروشگاه مراجعه کنید.

</p>


<a
href="{% url 'catalog:shop' %}"
class="inline-flex items-center justify-center
px-10 py-3
rounded-xl
bg-primary-600
hover:bg-primary-700
active:bg-primary-800
text-white
font-semibold
transition-all duration-200
focus:outline-none
focus:ring-2
focus:ring-primary-500
focus:ring-offset-2">

مشاهده محصولات

</a>


</div>

</div>

</main>

{% endblock %}
