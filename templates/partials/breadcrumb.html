<nav class="site-breadcrumb" aria-label="مسیر صفحه">
  <ol class="site-breadcrumb__list">
    {% for item in items %}
    <li class="site-breadcrumb__item">
      {% if not forloop.first %}
      <span class="site-breadcrumb__sep" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 6l-6 6l6 6"/>
        </svg>
      </span>
      {% endif %}
      {% if item.url %}
      <a href="{{ item.url }}" class="site-breadcrumb__link">
        {% if forloop.first %}
        <svg class="site-breadcrumb__home-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12l-2 0l9 -9l9 9l-2 0"/>
          <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/>
          <path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/>
        </svg>
        {% endif %}
        {{ item.label }}
      </a>
      {% else %}
      <span class="site-breadcrumb__current" aria-current="page">{{ item.label }}</span>
      {% endif %}
    </li>
    {% endfor %}
  </ol>
</nav>
